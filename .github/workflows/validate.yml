name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --locked

      - name: Unit tests
        run: cargo test --locked --lib

      - name: Contract preflight
        run: node ./ecdlp.js preflight
