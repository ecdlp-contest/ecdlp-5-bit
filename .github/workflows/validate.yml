name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup benchmark
        run: bash ./setup.sh

      - name: Format
        run: cargo fmt --check

      - name: Trusted benchmark
        env:
          ECDLP_EVAL_THREADS: "4"
        run: bash ./benchmark.sh --note "ci validation"

      - name: Package submission boundary
        run: node ./ecdlp.js package --note-file src/shor_oracle/memory/README.md --model "CI"

      - name: Validate package
        run: node ./ecdlp.js validate
